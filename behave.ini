[behave]
# ── Core settings ──────────────────────────────────────────────────────────────
paths            = features
lang             = en

# Log capture: mirror Python logging output to behave console
log_capture      = false
logging_level    = INFO
logging_format   = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
logging_datefmt  = %Y-%m-%d %H:%M:%S

# Color output in terminal (disable in CI by setting --no-color flag)
color            = true

# Stop on first failure (set to false for full run)
stop             = false

# Default format: pretty for local dev, use --format=json.pretty for CI
format           = pretty

# Outfile: write results to reports/ directory
outfile          = reports/behave_report.txt

# Show step timings
show_timings     = true

# Summary statistics at the end
summary          = true

# Dry run mode (uncomment to validate feature files without executing)
# dry_run         = true

# ── XML / JUnit Reporting settings ─────────────────────────────────────────────
# Generates XML reports compatible with CI tools (e.g. Jenkins, Azure DevOps, JUnit reader)
junit            = true
junit_directory  = reports/xml

